<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetMe — Đăng nhập</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="bg-deco"></div>

    <div class="auth-wrap">
      <!-- Left panel -->
      <div class="auth-left">
        <div class="auth-brand">TechShop <span>Personal Shop</span></div>
        <ul class="auth-features">
          <li>
            <div class="feat-icon">👤</div>
            <span>Mua sắm online</span>
          </li>
          <li>
            <div class="feat-icon">☁️</div>
            <span>Thanh toán online</span>
          </li>
          <li>
            <div class="feat-icon">🖼️</div>
            <span>Đánh giá sản phẩm</span>
          </li>
          <li>
            <div class="feat-icon">🔒</div>
            <span>Bảo mật tài khoản</span>
          </li>
        </ul>
        <p class="auth-copy">© 2025 TechShop. All rights reserved.</p>
      </div>

      <!-- Right panel -->
      <div class="auth-right">
        <h2>Chào mừng trở lại!</h2>
        <p class="auth-subtitle">
          Đăng nhập để tiếp tục mua sắm online.
        </p>

        <div class="msg-error" id="msg-error"></div>
        <div class="msg-success" id="msg-success"></div>

        <!-- Email + Password -->
        <div class="form-group-auth">
          <label>Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="email@example.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group-auth">
          <label>Mật khẩu</label>
          <div class="input-pw-wrap">
            <input
              type="password"
              id="login-password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pw" id="toggle-pw">👁</button>
          </div>
        </div>

        <div class="forgot-wrap">
          <button type="button" class="btn-link" id="btn-forgot">
            Quên mật khẩu?
          </button>
        </div>

        <button class="btn btn-primary" id="btn-login">Đăng nhập</button>

        <div class="divider-or"><span>hoặc</span></div>

        <button class="btn btn-google" id="btn-google">
          <svg
            width="18"
            height="18"
            viewBox="0 0 48 48"
            style="flex-shrink: 0"
          >
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
            />
            <path
              fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
            />
          </svg>
          Tiếp tục với Google
        </button>

        <p class="auth-switch">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </p>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        onAuthStateChanged,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyB-tBurz5gMYTB2VfU_KvAgO_54lOke9hQ",
        authDomain: "project-d8beb.firebaseapp.com",
        projectId: "project-d8beb",
        storageBucket: "project-d8beb.firebasestorage.app",
        messagingSenderId: "367976119507",
        appId: "1:367976119507:web:ef78fe848b4ad45cb6a826",
        measurementId: "G-ZDNSN02HW8",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      // Đã đăng nhập → vào trang chủ
      onAuthStateChanged(auth, (user) => {
        // Đã đăng nhập → về trang trước hoặc index
        const from =
          new URLSearchParams(location.search).get("from") || "index.html";
        if (user) window.location.href = from;
      });

      const errorEl = document.getElementById("msg-error");
      const successEl = document.getElementById("msg-success");

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = "block";
        successEl.style.display = "none";
      }
      function showSuccess(msg) {
        successEl.textContent = msg;
        successEl.style.display = "block";
        errorEl.style.display = "none";
      }
      function clearMsg() {
        errorEl.style.display = successEl.style.display = "none";
      }

      function parseError(code) {
        return (
          {
            "auth/user-not-found": "Email không tồn tại.",
            "auth/wrong-password": "Mật khẩu không đúng.",
            "auth/invalid-credential": "Email hoặc mật khẩu không đúng.",
            "auth/invalid-email": "Email không hợp lệ.",
            "auth/too-many-requests":
              "Quá nhiều lần thử, vui lòng thử lại sau.",
            "auth/popup-blocked": "Popup bị chặn, hãy cho phép popup.",
            "auth/popup-closed-by-user": "Bạn đã đóng cửa sổ đăng nhập.",
          }[code] || "Lỗi: " + code
        );
      }

      // Toggle password
      document
        .getElementById("toggle-pw")
        .addEventListener("click", function () {
          var input = document.getElementById("login-password");
          if (input.type === "password") {
            input.type = "text";
            this.textContent = "🙈";
          } else {
            input.type = "password";
            this.textContent = "👁";
          }
        });

      // Email login
      document
        .getElementById("btn-login")
        .addEventListener("click", async function () {
          var email = document.getElementById("login-email").value.trim();
          var pass = document.getElementById("login-password").value;
          if (!email || !pass) {
            showError("Vui lòng nhập email và mật khẩu.");
            return;
          }
          this.disabled = true;
          this.innerHTML = '<span class="spinner"></span>';
          clearMsg();
          try {
            await signInWithEmailAndPassword(auth, email, pass);
          } catch (e) {
            showError(parseError(e.code));
            this.disabled = false;
            this.textContent = "Đăng nhập";
          }
        });

      // Enter key
      ["login-email", "login-password"].forEach(function (id) {
        document.getElementById(id).addEventListener("keydown", function (e) {
          if (e.key === "Enter") document.getElementById("btn-login").click();
        });
      });

      // Google
      document
        .getElementById("btn-google")
        .addEventListener("click", async function () {
          clearMsg();
          try {
            await signInWithPopup(auth, provider);
          } catch (e) {
            showError(parseError(e.code));
          }
        });

      // Forgot password
      document
        .getElementById("btn-forgot")
        .addEventListener("click", async function () {
          var email = document.getElementById("login-email").value.trim();
          if (!email) {
            showError("Nhập email vào ô trên rồi nhấn Quên mật khẩu.");
            return;
          }
          try {
            await sendPasswordResetEmail(auth, email);
            showSuccess("Email đặt lại mật khẩu đã gửi tới " + email);
          } catch (e) {
            showError(parseError(e.code));
          }
        });
    </script>
  </body>
</html>
